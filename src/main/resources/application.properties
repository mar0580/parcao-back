#postgres-local
spring.jpa.properties.hibernate.dialect= org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=jdbc:postgresql://rasp.local:5432/testdb?ssl=true&sslmode=require
spring.datasource.username= postgres
spring.datasource.password= root

server.port=${SERVER_PORT:5000}

#postgres-Heroku

# JWT (dev/local defaults)
parcao.app.jwtSecret=${PARCAO_APP_JWT_SECRET:parcao-local-dev-secret-change-me-2026}
parcao.app.jwtExpirationMs=${PARCAO_APP_JWT_EXPIRATION_MS:86400000}

# Spring Mail (SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:seu-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:sua-senha-ou-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Destinatarios de e-mail
spring.mail.recipient.dev=${MAIL_RECIPIENT_DEV:dev@parcao.com}
spring.mail.recipient.user=${MAIL_RECIPIENT_USER:usuario@parcao.com}

# Logging
logging.level.root=INFO
logging.level.com.parcao=INFO
logging.file.name=logs/parcao.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=14
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [%X{correlationId}] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [%X{correlationId}] %logger{36} - %msg%n
